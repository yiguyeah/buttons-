<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Useful Websites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h2>Useful Websites</h2>
<a href="https://www.youtube.com" target="_blank">
    <button class="btn youtube"><img src="https://www.iconpacks.net/icons/2/free-youtube-logo-icon-2431-thumb.png" width="80"></button>
   
</a>

<a href="https://www.google.com" target="_blank">
    <button class="btn google"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Google_Favicon_2025.svg/250px-Google_Favicon_2025.svg.png" width="80"></button>
</a>
<a href="https://en.wikipedia.org/wiki/Main_Page" target="_blank">
    <button class="btn wikipedia"><img src="https://upload.wikimedia.org/wikipedia/en/thumb/8/80/Wikipedia-logo-v2.svg/1280px-Wikipedia-logo-v2.svg.png"width="80"></button>
</a>

<a href="https://www.khanacademy.org/" target="_blank">
    <button class="btn khan"><img src="https://user-images.githubusercontent.com/41707197/56105496-bc44bd80-5ef9-11e9-8f65-859cda5d8941.png" width="80"></button>
</a>
<a href="https://www.natgeokids.com/nz/" target="_blank">
    <button class="btn national"><img src="https://logoeps.com/wp-content/uploads/2013/04/national-geographic-kids-vector-logo.png" height="80"></button>
</a>

<a href="https://www.canva.com/" target="_blank">
    <button class="btn canva"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/canva-icon.png" width="80"></button>
</a>

<h1>Click the buttons below to change the background-color!</h1>
<button class="btn lightblue"onclick="document.body.style.backgroundColor = 'lightblue'">
  Change to Light Blue!
</button>
<button class="btn lightcoral"onclick="document.body.style.backgroundColor = 'lightcoral'">
  Change to Light Coral!
</button>
<button class="btn lightgreen"onclick="document.body.style.backgroundColor = 'lightgreen'">
  Change to Light Green!
</button>

</body>
</html>
